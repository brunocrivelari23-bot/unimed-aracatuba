<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unimed Araçatuba - Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

body {
    background: linear-gradient(to bottom, #00995D 72%, #B1D34B 72%);
    min-height: 100vh;
    display: flex;
    justify-content: center; 
    align-items: center;     
    overflow-x: hidden;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #00995D;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: .5s;
}
.loader.hide { opacity: 0; visibility: hidden; }
.loader img { width: 150px; animation: pulse 1.2s infinite; }

@keyframes pulse {
    0%,100% {transform: scale(1); opacity:.7;}
    50% {transform: scale(1.1); opacity:1;}
}

.fade-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
}
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

.container {
    width: 100%;
    max-width: 500px; 
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.logo { 
    width: 250px; 
    max-width: 85%;
    margin-bottom: 20px;
}

.subtitle {
    color: white;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 30px;
}

.links-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
}

.link-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    width: 100%;
}

.circle {
    width: 50px;
    height: 50px;
    min-width: 50px;
    border-radius: 50%;
    background: #004B2F;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.wpp-circle { background: #F39200; }

.btn {
    flex-grow: 1;
    padding: 16px;
    border-radius: 40px;
    font-weight: bold;
    color: #004B2F;
    background: #CFE3C9;
    transition: 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    font-size: 15px;
    text-align: center;
}

.link-row:hover .btn { background: #ffffff; transform: scale(1.02); }
.link-row:hover .circle { transform: scale(1.1) rotate(10deg); }

/* --- SEÇÃO BETH + REDES SOCIAIS AJUSTADA --- */
.social-section-container {
    width: 100%;
    display: flex;
    align-items: flex-end; 
    justify-content: center;
    gap: 12px;
    margin-bottom: 35px;
}

.beth-avatar-box {
    width: 105px; 
    flex-shrink: 0;
}
.beth-avatar-box img {
    width: 100%;
    height: auto;
    display: block;
}

.social-content-box {
    flex-grow: 1;
    max-width: 275px;
    display: flex;
    flex-direction: column;
    gap: 10px; /* Aumentado levemente o respiro */
}

.social-header-bar {
    background: #004B2F;
    color: white;
    padding: 8px 10px; /* Mais compacta */
    border-radius: 10px;
    font-weight: bold;
    font-size: 10.5px; /* Diminuído conforme pedido */
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    width: fit-content;
    margin: 0 auto 5px auto;
}

.social-rows-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.social-row {
    display: flex;
    justify-content: center;
    gap: 10px; /* Aumentado o espaço entre botões */
}

.social-item {
    display: flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    transition: 0.3s;
}

.s-icon {
    width: 34px; /* Aumentado conforme pedido */
    height: 34px;
    border-radius: 50%;
    background: #00995D;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
}

.s-label {
    background: #F39200;
    color: white;
    padding: 5px 10px; /* Aumentado levemente */
    border-radius: 12px;
    font-weight: bold;
    font-size: 10.5px; /* Aumentado conforme pedido */
    white-space: nowrap;
}

.copy-footer {
    width: 100%;
    font-size: 11px;
    color: #004B2F;
    font-weight: bold;
    text-align: center;
}

@media (max-width: 500px) {
    body { background: linear-gradient(to bottom, #00995D 78%, #B1D34B 78%); }
    .beth-avatar-box { width: 95px; }
}
</style>
</head>

<body>

<div class="loader" id="loader">
    <img src="logo.svg" alt="Carregando...">
</div>

<div class="container">
    <img src="logo.svg" class="logo fade-up" alt="Unimed Araçatuba">
    
    <p class="subtitle fade-up d1">Como podemos te ajudar hoje?</p>

    <div class="links-area">
        <a href="#" class="link-row fade-up d2">
            <div class="circle"><i class="fas fa-globe"></i></div>
            <div class="btn">Site Oficial</div>
        </a>
        <a href="tel:+551836361300" class="link-row fade-up d3">
            <div class="circle"><i class="fas fa-phone-alt"></i></div>
            <div class="btn">Central de Atendimento</div>
        </a>
        <a href="https://wa.me/551836361300" class="link-row fade-up d4">
            <div class="circle wpp-circle"><i class="fab fa-whatsapp"></i></div>
            <div class="btn">Fale conosco pelo WhatsApp</div>
        </a>
        <a href="#" class="link-row fade-up d5">
            <div class="circle"><i class="fas fa-mobile-alt"></i></div>
            <div class="btn">Baixe o App Unimed</div>
        </a>
        <a href="#" class="link-row fade-up d6">
            <div class="circle"><i class="fas fa-hospital-user"></i></div>
            <div class="btn">Entre no nosso PA Virtual</div>
        </a>
        <a href="#" class="link-row fade-up d7">
            <div class="circle"><i class="fas fa-procedures"></i></div>
            <div class="btn">Acompanhe o status da cirurgia</div>
        </a>
    </div>

    <div class="social-section-container fade-up d7">
        <div class="beth-avatar-box">
            <img src="beth.svg" alt="Beth Unimed">
        </div>

        <div class="social-content-box">
            <div class="social-header-bar">Nos siga em nossas redes sociais!</div>
            
            <div class="social-rows-grid">
                <div class="social-row">
                    <a href="#" class="social-item">
                        <div class="s-icon"><i class="fab fa-instagram"></i></div>
                        <div class="s-label">Instagram</div>
                    </a>
                    <a href="#" class="social-item">
                        <div class="s-icon"><i class="fab fa-linkedin-in"></i></div>
                        <div class="s-label">LinkedIn</div>
                    </a>
                </div>
                <div class="social-row">
                    <a href="#" class="social-item">
                        <div class="s-icon"><i class="fab fa-youtube"></i></div>
                        <div class="s-label">YouTube</div>
                    </a>
                    <a href="#" class="social-item">
                        <div class="s-icon"><i class="fab fa-facebook-f"></i></div>
                        <div class="s-label">Facebook</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <p class="copy-footer fade-up d7">© 2026 Unimed Araçatuba - Todos os direitos reservados</p>
</div>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").classList.add("hide");
    }, 600);
});
</script>

</body>
</html>
