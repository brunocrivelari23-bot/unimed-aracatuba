<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversário da Melinda 🎉</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

/* 🎬 VÍDEO */
#bg-video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  transition: transform 2s ease;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.3);
  z-index:-1;
  transition: background 2s ease;
}

/* 🎥 TRANSIÇÃO */
body.transition #bg-video{
  transform: scale(1.5);
  filter: blur(5px);
}

body.transition .overlay{
  background: rgba(0,0,0,0.9);
}

/* 🌊 TELA 1 */
.tela1{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn{
  padding:20px 50px;
  font-size:22px;
  background:#8B5A2B;
  color:#fff;
  border-radius:12px;
  text-decoration:none;
  animation: float 3s infinite;
}

@keyframes float{
  50%{transform: translateY(-10px);}
}

/* 🌺 TELA 2 */
.tela2{
  display:none;
  min-height:100vh;
  background: url('fundo.jpg') center/cover;
  padding:20px;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.card{
  background: rgba(255,255,255,0.95);
  border-radius:20px;
  padding:30px;
  max-width:450px;
  margin:80px auto;
  text-align:center;
}

.btn2{
  display:block;
  background:#25D366;
  color:white;
  padding:12px;
  border-radius:10px;
  margin-top:15px;
  text-decoration:none;
}

/* formulário */
form{
  margin-top:20px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  background:#00b4d8;
  color:white;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- 🎬 VÍDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🌊 TELA 1 -->
<div class="tela1" id="tela1">
  <a href="#" class="btn" onclick="entrar()">🌊 Navegar no oceano</a>
</div>

<!-- 🌺 TELA 2 -->
<div class="tela2" id="tela2">
  <div class="card">
    <h1>🌊 Melinda faz 2 aninhos!</h1>
    <p>O oceano está chamando... 🌺</p>

    <p><strong>📅 24 de Abril</strong></p>
    <p><strong>⏰ 19h30</strong></p>
    <p><strong>📍 Buffet Villa Palace</strong></p>

    <!-- 📲 BOTÃO DIRETO -->
    <a class="btn2" 
    href="https://wa.me/5518996524656?text=Confirmo%20presença%20no%20aniversário%20da%20Melinda">
      Confirmar rápido no WhatsApp
    </a>

    <!-- 📋 FORMULÁRIO -->
    <form onsubmit="enviarWhats(event)">
      <input type="text" id="nome" placeholder="Seu nome" required>
      <input type="number" id="qtd" placeholder="Quantidade de pessoas" required>
      <button type="submit">Confirmar Presença</button>
    </form>

  </div>
</div>

<script>
function entrar(){
  document.body.classList.add('transition');

  setTimeout(()=>{
    document.getElementById('tela1').style.display = 'none';
    document.getElementById('tela2').style.display = 'block';
  },2000);
}

function enviarWhats(event){
  event.preventDefault();

  let nome = document.getElementById('nome').value;
  let qtd = document.getElementById('qtd').value;

  let mensagem = `Olá! Meu nome é ${nome}.
Confirmo presença no aniversário da Melinda 🎉
Quantidade de pessoas: ${qtd}`;

  let url = "https://wa.me/5518996524656?text=" + encodeURIComponent(mensagem);

  window.open(url, '_blank');
}
</script>

</body>
</html>
