<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unimed Araçatuba - Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

body {
    /* Fundo degradê: Verde bandeira e Verde limão */
    background: linear-gradient(to bottom, #00995D 72%, #B1D34B 72%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #00995D;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: .5s;
}
.loader.hide { opacity: 0; visibility: hidden; }
.loader img { width: 150px; animation: pulse 1.2s infinite; }

@keyframes pulse {
    0%,100% {transform: scale(1); opacity:.7;}
    50% {transform: scale(1.1); opacity:1;}
}

/* ANIMAÇÃO DE ENTRADA */
.fade-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
}
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

.container {
    width: 100%;
    max-width: 500px; 
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.logo { 
    width: 280px; 
    max-width: 90%;
    height: auto;
    margin-bottom: 20px;
}

.subtitle {
    color: white;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 30px;
}

/* ÁREA DE BOTÕES */
.links-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
}

.link-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    width: 100%;
}

.circle {
    width: 50px;
    height: 50px;
    min-width: 50px;
    border-radius: 50%;
    background: #004B2F;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Destaque para o WhatsApp */
.wpp-circle { background: #F39200; }

.btn {
    flex-grow: 1;
    padding: 16px;
    border-radius: 40px;
    font-weight: bold;
    color: #004B2F;
    background: #CFE3C9;
    transition: 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    font-size: 15px;
}

/* ANIMAÇÃO HOVER */
.link-row:hover .btn {
    background: #ffffff;
    transform: scale(1.02);
}
.link-row:hover .circle {
    transform: scale(1.1) rotate(10deg);
}

/* BARRA SOCIAL */
.social-header {
    background: #004B2F;
    color: white;
    padding: 14px 40px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* REDES SOCIAIS */
.social-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px; 
    width: 100%;
    margin-bottom: 30px;
}

.social-unit {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    transition: 0.4s;
}

.social-unit:hover {
    transform: translateY(-8px);
}

.s-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #00995D;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

.s-pill {
    background: #F39200;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 11px;
}

/* RODAPÉ CENTRALIZADO */
.copyright {
    width: 100%;
    font-size: 11px;
    color: #004B2F;
    font-weight: bold;
    text-align: center;
}

/* Delays das animações */
.d1 { animation-delay: 0.1s; }
.d2 { animation-delay: 0.2s; }
.d3 { animation-delay: 0.3s; }
.d4 { animation-delay: 0.4s; }
.d5 { animation-delay: 0.5s; }
.d6 { animation-delay: 0.6s; }
.d7 { animation-delay: 0.7s; }

@media (max-width: 500px) {
    body { background: linear-gradient(to bottom, #00995D 78%, #B1D34B 78%); }
    .social-grid { flex-wrap: wrap; }
    .btn { font-size: 13px; }
}
</style>
</head>
